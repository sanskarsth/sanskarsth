<!doctype html>
<html lang="en">
  <head>
    <!-- SECURITY: Character encoding (MUST be first) -->
    <meta charset="UTF-8" />
    
    <!-- SECURITY: Content Security Policy (prevents XSS attacks) -->
    <meta 
      http-equiv="Content-Security-Policy" 
      content="
        default-src 'self';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        script-src 'self';
        img-src 'self' data: https:;
        font-src 'self' https://fonts.gstatic.com;
        connect-src 'self' https://generativelanguage.googleapis.com https://*.supabase.co wss://*.supabase.co;
        object-src 'none';
        base-uri 'self';
        form-action 'self';
        frame-ancestors 'none';
        upgrade-insecure-requests;
      "
    />
    
    <!-- SECURITY: Additional security headers -->
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-no-referrer" />
    
    <!-- SEO & BRANDING -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanskar Shrestha • Curated Extraordinary Journeys & Luxury Expeditions</title>
    <meta name="description" content="Premium travel consultant portfolio for custom expeditions, luxury escapes, and tailor-made Himalayan journeys by Sanskar Shrestha." />
    
    <!-- SEO: Open Graph (Social Media) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Sanskar Shrestha • Curated Extraordinary Journeys & Luxury Expeditions" />
    <meta property="og:description" content="Premium travel consultant portfolio for custom expeditions, luxury escapes, and tailor-made Himalayan journeys." />
    <meta property="og:image" content="/src/assets/images/hero_himalayas_1780318764999.png" />
    <meta property="og:url" content="https://sanskarshrestha.com" />
    
    <!-- SEO: Canonical URL -->
    <link rel="canonical" href="https://sanskarshrestha.com" />
    
    <!-- BRANDING: Theme color -->
    <meta name="theme-color" content="#0F0A1A" />
    
    <!-- SECURITY: Format detection disable -->
    <meta name="format-detection" content="telephone=no, email=no" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
