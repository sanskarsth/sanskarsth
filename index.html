<!doctype html>
<html lang="en">
  <head>
    <!-- SECURITY: Character encoding (MUST be first) -->
    <meta charset="UTF-8" />
    
    <!-- SECURITY: Content Security Policy (prevents XSS attacks) -->
    <meta 
      http-equiv="Content-Security-Policy" 
      content="
        default-src 'self';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        script-src 'self';
        img-src 'self' data: https:;
        font-src 'self' https://fonts.gstatic.com;
        connect-src 'self' https://generativelanguage.googleapis.com https://*.supabase.co wss://*.supabase.co;
        object-src 'none';
        base-uri 'self';
        form-action 'self';
        frame-ancestors 'none';
        upgrade-insecure-requests;
      "
    />
    
    <!-- SECURITY: Additional security headers -->
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-no-referrer" />
    
    <!-- SEO & BRANDING -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanskar Shrestha | Travel, Visa & Overseas Recruitment Consultant Nepal</title>
    <meta name="description" content="Travel, visa processing, international flight ticketing, hotel booking, and overseas manpower recruitment services from Nepal. Your complete travel and recruitment partner." />
    
    <!-- SEO: Open Graph (Social Media) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Sanskar Shrestha | Travel, Visa & Overseas Recruitment Consultant Nepal" />
    <meta property="og:description" content="Travel, visa processing, international flight ticketing, hotel booking, and overseas manpower recruitment services from Nepal. Your complete travel and recruitment partner." />
    <meta property="og:image" content="https://www.ssanskar.com.np/src/assets/images/hero_himalayas_1780318764999.png" />
    <meta property="og:url" content="https://www.ssanskar.com.np/" />
    
    <!-- SEO: Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sanskar Shrestha | Travel, Visa & Overseas Recruitment Consultant Nepal" />
    <meta name="twitter:description" content="Travel, visa processing, international flight ticketing, hotel booking, and overseas manpower recruitment services from Nepal. Your complete travel and recruitment partner." />
    <meta name="twitter:image" content="https://www.ssanskar.com.np/src/assets/images/hero_himalayas_1780318764999.png" />

    <!-- SECURITY: Format detection disable -->
    <meta name="format-detection" content="telephone=no, email=no" />
  </head>
