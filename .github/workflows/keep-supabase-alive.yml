name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    
    steps:
      - name: Debug - Check secrets exist
        run: |
          if [ -n "${{ secrets.SUPABASE_URL }}" ]; then
            echo "✅ SUPABASE_URL secret exists"
            echo "URL starts with: ${{ secrets.SUPABASE_URL }}"
          else
            echo "❌ SUPABASE_URL secret is MISSING"
          fi
          
          if [ -n "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "✅ SUPABASE_ANON_KEY secret exists"
          else
            echo "❌ SUPABASE_ANON_KEY secret is MISSING"
          fi
      
      - name: Ping Supabase (alternative endpoint)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Try the auth endpoint instead (lighter and always available)
          curl -o /dev/null -w "%{http_code}" \
            -X GET "${SUPABASE_URL}/auth/v1/settings" \
            -H "apikey: ${SUPABASE_ANON_KEY}"